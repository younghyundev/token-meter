<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3a"/>
      <stop offset="100%" style="stop-color:#12122a"/>
    </linearGradient>
    <linearGradient id="gaugeFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="45%" style="stop-color:#fbbf24"/>
      <stop offset="75%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <radialGradient id="innerLight" cx="40%" cy="35%" r="55%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
    <filter id="arcGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="24" y="24" width="976" height="976" rx="224" ry="224" fill="url(#bg)"/>
  <rect x="24" y="24" width="976" height="976" rx="224" ry="224" fill="url(#innerLight)"/>
  <rect x="24" y="24" width="976" height="976" rx="224" ry="224"
        fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>

  <!--
    Gauge center = (512, 460), R = 270, 270° arc, gap at bottom.
    Standard math angles, SVG y-flip: svgX = R*cos(θ), svgY = -R*sin(θ)

    Start (225°, lower-left): (-190.92, 190.92)
    End   (315°, lower-right): (190.92, 190.92)
    Clockwise on screen = sweep-flag 1, large-arc-flag 1 (270° > 180°)

    65% fill = 175.5°, end angle = 225° - 175.5° = 49.5°
    Fill end: (175.3, -205.3)  sweep=1, large-arc=0 (175.5° < 180°)
  -->
  <g transform="translate(512, 500)">

    <!-- Track: full 270° arc -->
    <path d="M -190.92 190.92 A 270 270 0 1 1 190.92 190.92"
          fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="40" stroke-linecap="round"/>

    <!-- Fill: 65% of 270° = 175.5° -->
    <path d="M -190.92 190.92 A 270 270 0 0 1 175.3 -205.3"
          fill="none" stroke="url(#gaugeFill)" stroke-width="40" stroke-linecap="round"
          filter="url(#arcGlow)"/>

    <!-- Tick dots on R=310, every 15° from 225° to 315° clockwise (19 dots) -->
    <g fill="#ffffff" fill-opacity="0.12">
      <circle cx="-219.2" cy="219.2"  r="3.5"/>  <!-- 225° start -->
      <circle cx="-268.5" cy="155"    r="3.5"/>  <!-- 210° -->
      <circle cx="-299.5" cy="80.2"   r="3.5"/>  <!-- 195° -->
      <circle cx="-310"   cy="0"      r="3.5"/>  <!-- 180° -->
      <circle cx="-299.5" cy="-80.2"  r="3.5"/>  <!-- 165° -->
      <circle cx="-268.5" cy="-155"   r="3.5"/>  <!-- 150° -->
      <circle cx="-219.2" cy="-219.2" r="3.5"/>  <!-- 135° -->
      <circle cx="-155"   cy="-268.5" r="3.5"/>  <!-- 120° -->
      <circle cx="-80.2"  cy="-299.5" r="3.5"/>  <!-- 105° -->
      <circle cx="0"      cy="-310"   r="3.5"/>  <!--  90° top -->
      <circle cx="80.2"   cy="-299.5" r="3.5"/>  <!--  75° -->
      <circle cx="155"    cy="-268.5" r="3.5"/>  <!--  60° -->
      <circle cx="219.2"  cy="-219.2" r="3.5"/>  <!--  45° -->
      <circle cx="268.5"  cy="-155"   r="3.5"/>  <!--  30° -->
      <circle cx="299.5"  cy="-80.2"  r="3.5"/>  <!--  15° -->
      <circle cx="310"    cy="0"      r="3.5"/>  <!--   0° -->
      <circle cx="299.5"  cy="80.2"   r="3.5"/>  <!-- 345° -->
      <circle cx="268.5"  cy="155"    r="3.5"/>  <!-- 330° -->
      <circle cx="219.2"  cy="219.2"  r="3.5"/>  <!-- 315° end -->
    </g>

    <!-- Percentage -->
    <text x="0" y="35" text-anchor="middle"
          font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif"
          font-size="150" font-weight="700" fill="#ffffff" letter-spacing="-6">
      65<tspan font-size="72" fill-opacity="0.6" dx="2">%</tspan>
    </text>

    <!-- Label -->
    <text x="0" y="92" text-anchor="middle"
          font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif"
          font-size="32" font-weight="500" fill="#ffffff" fill-opacity="0.3" letter-spacing="6">
      TOKENS
    </text>
  </g>

  <!-- Bottom indicators -->
  <g transform="translate(512, 750)">
    <rect x="-114" y="0" width="64" height="5" rx="2.5" fill="#34d399" fill-opacity="0.8"/>
    <rect x="-32"  y="0" width="64" height="5" rx="2.5" fill="#fbbf24" fill-opacity="0.8"/>
    <rect x="50"   y="0" width="64" height="5" rx="2.5" fill="#ef4444" fill-opacity="0.35"/>
    <text x="-82" y="26" text-anchor="middle"
          font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif"
          font-size="20" font-weight="500" fill="#ffffff" fill-opacity="0.25">5H</text>
    <text x="0" y="26" text-anchor="middle"
          font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif"
          font-size="20" font-weight="500" fill="#ffffff" fill-opacity="0.25">7D</text>
    <text x="82" y="26" text-anchor="middle"
          font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif"
          font-size="20" font-weight="500" fill="#ffffff" fill-opacity="0.25">MAX</text>
  </g>

  <!-- Claude sparkle accents -->
  <g fill="#D4A574" fill-opacity="0.6">
    <path transform="translate(748, 230) scale(1.1)"
          d="M 0 -18 C 2.5 -2.5 4.5 0 18 0 C 4.5 0 2.5 2.5 0 18 C -2.5 2.5 -4.5 0 -18 0 C -4.5 0 -2.5 -2.5 0 -18 Z"/>
  </g>
  <g fill="#D4A574" fill-opacity="0.3">
    <path transform="translate(795, 278) scale(0.6)"
          d="M 0 -18 C 2.5 -2.5 4.5 0 18 0 C 4.5 0 2.5 2.5 0 18 C -2.5 2.5 -4.5 0 -18 0 C -4.5 0 -2.5 -2.5 0 -18 Z"/>
  </g>
</svg>
